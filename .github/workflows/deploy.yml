name: Deploy Astro Blog to VPS

on:
  push:
    branches:
      - main  # 只有推送到 main 分支时才触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 安装 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 建议用 LTS 版本
          cache: 'npm'

      # 3. 安装依赖并打包
      - name: Install and Build
        run: |
          npm install
          npm run build

      # 4. 通过 Rsync 部署到 VPS
      - name: Deploy to VPS
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT }}
          SOURCE: "dist/"             # 打包后的文件夹
          TARGET: "/var/www/blog/"    # VPS 目标路径
          ARGS: "-avzr --delete"      # rsync 参数：--delete 会删除 VPS 上多余的旧文件